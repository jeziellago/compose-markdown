name: Android Test

on:
  pull_request:
    paths:
      - ".github/workflows/android-test.yml"
      - "markdowntext/**"
      - "sample/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-test.yml"
      - "markdowntext/**"
      - "sample/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: read

concurrency:
  group: android-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            bash -o pipefail -c './gradlew :markdowntext:connectedDebugAndroidTest 2>&1 | tee gradle-connectedDebugAndroidTest.log'
            test_status=$?
            adb logcat -d > android-logcat.txt || true
            exit $test_status

      - name: Upload Android test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-artifacts
          if-no-files-found: warn
          path: |
            gradle-connectedDebugAndroidTest.log
            android-logcat.txt
            markdowntext/build/reports/androidTests/
            markdowntext/build/outputs/androidTest-results/
            markdowntext/build/outputs/connected_android_test_additional_output/
