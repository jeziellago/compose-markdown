name: Android Test

on:
  pull_request:
    paths:
      - ".github/workflows/android-test.yml"
      - "markdowntext/**"
      - "sample/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/android-test.yml"
      - "markdowntext/**"
      - "sample/**"
      - "gradle/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"

permissions:
  contents: read

concurrency:
  group: android-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: full-api-29
            api-level: 29
            profile: pixel_2
            test-command: ./gradlew :markdowntext:connectedDebugAndroidTest --stacktrace
          - name: smoke-api-23
            api-level: 23
            profile: pixel_2
            test-command: ./gradlew :markdowntext:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=dev.jeziellago.compose.markdowntext.MarkdownTextViewInstrumentedTest --stacktrace
          - name: smoke-api-36
            api-level: 36
            profile: pixel_2
            test-command: ./gradlew :markdowntext:connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=dev.jeziellago.compose.markdowntext.MarkdownTextViewInstrumentedTest --stacktrace

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            bash -o pipefail -c '${{ matrix.test-command }} 2>&1 | tee gradle-connectedDebugAndroidTest-${{ matrix.name }}.log'
            test_status=$?
            adb logcat -d > android-logcat-${{ matrix.name }}.txt || true
            exit $test_status

      - name: Upload Android test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-artifacts-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            gradle-connectedDebugAndroidTest-${{ matrix.name }}.log
            android-logcat-${{ matrix.name }}.txt
            markdowntext/build/reports/androidTests/
            markdowntext/build/outputs/androidTest-results/
            markdowntext/build/outputs/connected_android_test_additional_output/
